<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.css" rel="stylesheet"/>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6.26.0/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="useSharedContent.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const Container = ({subject}) => {
        const comment1 = { text: "請輸入字符串，我將幫你哈希成SHA-1。", type: "received", isHTML: true };

        const pointMessages = [
            { text: `SHA-1 (Secure Hash Algorithm 1)<br>
概念：<br>
SHA-1 是由美國國家安全局（NSA）設計並由美國國家標準技術研究所（NIST）發布的安全散列算法。它能將任意長度的輸入數據轉換為固定長度的 160 位（20 字節）散列值，通常以 40 個十六進制數字表示。<br>
特性：<br>
抗碰撞性：SHA-1 的設計目的是為了防止不同輸入生成相同的散列值，但隨著時間的推移，發現了多種漏洞，使其容易受到碰撞攻擊。<br>
速度：SHA-1 的計算速度較快，但這也使其更容易受到暴力破解攻擊。<br>
安全性問題：由於 SHA-1 的安全性已被質疑，許多組織和標準已經不再推薦使用它。<br>
應用：<br>
SHA-1 曾廣泛應用於數字簽名、SSL/TLS 證書和版本控制系統等領域，但由於其安全性問題，許多應用已轉向使用更安全的哈希算法，如 SHA-256。`,
                type: "received", icon: "fa-solid fa-mug-hot", isHTML: true },
        ];

        const exampleMessages = [
        ];

        const testMessages = [
        ]

        const [messages, setMessages] = React.useState([
            // default messages
        ]);
        
        React.useEffect(() => {
            window.SharedContent.addcomment2();
            
            const combinedMessages = [comment1, ...window.SharedContent.comment2];
            setMessages(combinedMessages);
        }, []);
    
        const [inputMessage, setInputMessage] = React.useState("");
        
        const handleSendMessage = () => {
            window.SharedContent.handleSendMessage(subject, inputMessage, setMessages, setInputMessage,
                                                    pointMessages, exampleMessages, testMessages
            );
        };

        // 滾動功能
        React.useEffect(() => {
            window.SharedContent.scrollToBottom("chatBody");
        }, [messages]);


        window.SharedContent.resultMethod = (inputMessage ,istest) =>{
            if(istest){
                setMessages((prevMessages) => [
                    ...prevMessages,
                    { text: inputMessage, type: "sent" }
                ]);
            }

            const sha1Hash = CryptoJS.SHA1(inputMessage).toString();
            setTimeout(() => {
                setMessages((prevMessages) => [
                    ...prevMessages,
                    { text: sha1Hash, type: "received cancopy", icon: "fa-solid fa-copy", isHTML: true, copy: sha1Hash}
                ]);
            }, 1000); // 避免同時設置，根據 index 添加延遲
        }

        return (
            <div className="container">
                <div className="link-area" dangerouslySetInnerHTML={{ __html: subject }}></div>
                <div className="chat-box" id="chatBody">
                {messages.map((msg, index) => (
                    <div key={index} className={`message ${msg.type}`}
                    onClick={msg.copy && msg.type.includes("cancopy") ? 
                        () => window.SharedContent.handleCopy(msg.copy) : undefined}>
                    {msg.icon && <i className={msg.icon}></i>} {/* 顯示圖標 */}
                    {msg.isHTML ? (
                        <span dangerouslySetInnerHTML={{ __html: msg.text }}></span>
                    ) : (
                        msg.text
                    )}
                    </div>
                ))}
                </div>  
                <div className="input-area">
                <input
                    className="input-message"
                    id="messageInput"
                    placeholder="輸入消息..."
                    value={inputMessage}
                    onChange={(e) => setInputMessage(e.target.value)}
                />
                <button className="send-button" onClick={handleSendMessage}>
                    Send
                </button>
                </div>
            </div>
        );
    };

    // 主 App 組件
    const App = ({subject}) => {
      React.useEffect(() => {
        document.title = subject; // 設置動態標題
      }, [subject]);

      return (
        <React.Fragment>
          <Container subject='哈希（Hash）<br>將字串轉換為SHA-1 (Secure Hash Algorithm 1)'/>
        </React.Fragment>
      );
    };

    // 渲染 App 組件到 DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App subject='哈希（Hash）將字串轉換為SHA-1 (Secure Hash Algorithm 1)'/>);
  </script>
</body>
</html>
