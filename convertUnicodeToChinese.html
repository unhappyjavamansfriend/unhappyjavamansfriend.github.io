<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.css" rel="stylesheet"/>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6.26.0/babel.min.js"></script>
    <script src="useSharedContent.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const Container = ({subject}) => {
        const comment1 = { text: "請輸入Unicode，我將幫你轉換成字符串<br>或是輸入字符串，我將幫你轉換成Unicode。", type: "received", isHTML: true };

        const pointMessages = [
            { text: `Unicode 是一種字符編碼標準，旨在為世界上所有的字符提供唯一的編碼。每個字符都有一個對應的數字編碼，通常以十六進制表示`,
                type: "received", icon: "fa-solid fa-mug-hot", isHTML: true },
        ];

        const exampleMessages = [
        ];

        const testMessages = [
            '我很喜歡冰淇淋',' \\u  asd\\u65E9','\\uZZZZ\\u570B','早上好中國','\\u65E9\\u4E0A\\u597D\\u4E2D\\u570B','\\u4E00\\u9FFF','\\u\\u65E9','asd\\u65E9asd\\u65E9','\\u65E9上好\\u4E2D\\u570B','\\u６２Ｅ９'
        ]

        const [messages, setMessages] = React.useState([
            // default messages
        ]);
        
        React.useEffect(() => {
            window.SharedContent.addcomment2();
    
    const combinedMessages = [comment1, ...window.SharedContent.comment2];
    setMessages(combinedMessages);
        }, []);
    
        const [inputMessage, setInputMessage] = React.useState("");
        
        const handleSendMessage = () => {
            
            window.SharedContent.handleSendMessage(subject, inputMessage, setMessages, setInputMessage,
                                                    pointMessages, exampleMessages, testMessages
            );
        };

        // 滾動功能
        React.useEffect(() => {
            
            window.SharedContent.scrollToBottom("chatBody");
        }, [messages]);

        const UnicodeToStringToUnicode = (inputMessage) => {
            let result = 'ok';
            let msg = '';

            if (inputMessage.includes('\\u')) {
                msg = inputMessage.split('\\u').map((code, index) => 
                    index > 0 && code.length >= 4 && !isNaN(parseInt(code.substring(0, 4), 16)) 
                        ? String.fromCharCode(parseInt(code.substring(0, 4), 16)) + code.substring(4) // 转换 Unicode 并保留后续字符串
                        : code // 保留原样
                )
                .join(''); // 合并为字符串
            }else{
                // 將字符串轉換為 Unicode 編碼格式 (\uXXXX)
                msg = Array.from(inputMessage)
                .map(char => {
                    const codePoint = char.codePointAt(0).toString(16);
                    return codePoint.length > 4 
                    ? `\\u{${codePoint}}`
                    : `\\u${codePoint.padStart(4, '0')}`;
                })
                .join('');
            }

            return { result, msg, copy: msg };
        };

        window.SharedContent.resultMethod = (inputMessage ,istest) =>{
            if(istest){
                setMessages((prevMessages) => [
                    ...prevMessages,
                    { text: inputMessage, type: "sent" }
                ]);
            }

            const msg = UnicodeToStringToUnicode(inputMessage);

            if(msg.result === 'error' || istest){
                setTimeout(() => {
                    setMessages((prevMessages) => [
                        ...prevMessages,
                        { text: msg.msg, type: "received"}
                    ]);
                }, 1000);
            }else if(msg.result === 'ok'){
                setTimeout(() => {
                    setMessages((prevMessages) => [
                        ...prevMessages,
                        { text: msg.msg, type: "received cancopy", icon: "fa-solid fa-copy", isHTML: true, copy: msg.copy}
                    ]);
                }, 1000);
            }
        }

        return (
            <div className="container">
                <div className="link-area" dangerouslySetInnerHTML={{ __html: subject }}></div>
                <div className="chat-box" id="chatBody">
                {messages.map((msg, index) => (
                    <div key={index} className={`message ${msg.type}`}
                    onClick={msg.copy && msg.type.includes("cancopy") ? 
                        () => window.SharedContent.handleCopy(msg.copy) : undefined}>
                    {msg.icon && <i className={msg.icon}></i>} {/* 顯示圖標 */}
                    {msg.isHTML ? (
                        <span dangerouslySetInnerHTML={{ __html: msg.text }}></span>
                    ) : (
                        msg.text
                    )}
                    </div>
                ))}
                </div>  
                <div className="input-area">
                <input
                    className="input-message"
                    id="messageInput"
                    placeholder="輸入消息..."
                    value={inputMessage}
                    onChange={(e) => setInputMessage(e.target.value)}
                />
                <button className="send-button" onClick={handleSendMessage}>
                    Send
                </button>
                </div>
            </div>
        );
    };

    // 主 App 組件
    const App = ({subject}) => {
      React.useEffect(() => {
        document.title = subject; // 設置動態標題
      }, [subject]);

      return (
        <React.Fragment>
          <Container subject='编码（Encode）<br>字符串和Unicode的相互转换方式<br>convert unicode to string to unicode'/>
        </React.Fragment>
      );
    };

    // 渲染 App 組件到 DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App subject='编码（Encode） 字符串和Unicode的相互转换方式 convert unicode to string to unicode'/>);
  </script>
</body>
</html>
