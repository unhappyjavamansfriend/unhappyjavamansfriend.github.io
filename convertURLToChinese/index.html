<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解密編碼世界：掌握字符解析 URL！</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="link-area">
            <a href="../index.html" class="home-link"><i class="fas fa-home"></i></a>
        </div>
        <div class="chat-box" id="chatBody">
            <div class="message sent title" onclick="removeEx()">
                <i class="fa-solid fa-code"></i> URL 編碼 
            </div>
            <div class="message sent explain" onclick="explain()"><i class="fas fa-hand-pointer"></i>
                點我生成說明</div>
            <div class="message sent example" onclick="example()"><i class="fas fa-hand-pointer"></i>
                點我生成範例</div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="輸入消息..." class="input-message">
            <button onclick="sendMessage()" class="send-button">send</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
