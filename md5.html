<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.css" rel="stylesheet"/>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6.26.0/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="useSharedContent.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const Container = ({subject}) => {
        const comment1 = { text: "請輸入字符串，我將幫你轉換成MD5。", type: "received", isHTML: true };

        const pointMessages = [
            { text: `MD5訊息摘要演算法（英語：MD5 Message-Digest Algorithm），一種被廣泛使用的密碼雜湊函數，可以產生出一個128位元（16位元組）的散列值（hash value），用於確保信息傳輸完整一致。MD5由羅納德·李維斯特設計，於1992年公開，用以取代MD4演算法。這套演算法的程序在 RFC 1321 中被加以規範。
    將數據（如一段文字）運算變為另一固定長度值，是雜湊算法的基礎原理。`,
                type: "received", icon: "fa-solid fa-mug-hot", isHTML: true },
        ];

        const exampleMessages = [
        ];

        const testMessages = [
        ]

        const [messages, setMessages] = React.useState([
        comment1,window.SharedContent.comment2
            // default messages
        ]);
    
        const [inputMessage, setInputMessage] = React.useState("");
        
        const handleSendMessage = () => {
            // 調用 common.js 中的全局方法
            window.SharedContent.handleSendMessage(subject, inputMessage, setMessages, setInputMessage,
                                                    pointMessages, exampleMessages, testMessages
            );
        };

        // 滾動功能
        React.useEffect(() => {
            // 調用全局的滾動方法
            window.SharedContent.scrollToBottom("chatBody");
        }, [messages]);


        window.SharedContent.resultMethod = (inputMessage ,istest) =>{
            if(istest){
                setMessages((prevMessages) => [
                    ...prevMessages,
                    { text: inputMessage, type: "sent" }
                ]);
            }
            // 計算 MD5 值並生成對應的變體陣列
            const messageTextArray = ['32位[大]' ,'32位[小]' ,'16位[大]' ,'16位[小]'];

            const fullMD5 = CryptoJS.MD5(inputMessage).toString();
            const md5Array = [
                fullMD5.toUpperCase(), // 32位[大]
                fullMD5.substring(8, 24).toUpperCase(), // 16位[大]
                fullMD5.toLowerCase(), // 32位[小]
                fullMD5.substring(8, 24).toLowerCase() // 16位[小]
            ];

            // 使用 forEach 處理每個 messageTextArray 的元素
            messageTextArray.forEach((label, index) => {
                setTimeout(() => {
                    setMessages((prevMessages) => [
                        ...prevMessages,
                        { text: `${label}<br>${md5Array[index]}`, type: "received cancopy", icon: "fa-solid fa-copy", isHTML: true, copy: md5Array[index]}
                    ]);
                }, 1000); // 避免同時設置，根據 index 添加延遲
            });
        }

        return (
            <div className="container">
                <div className="link-area" dangerouslySetInnerHTML={{ __html: subject }}></div>
                <div className="chat-box" id="chatBody">
                {messages.map((msg, index) => (
                    <div key={index} className={`message ${msg.type}`}
                    onClick={msg.copy && msg.type.includes("cancopy") ? 
                        () => window.SharedContent.handleCopy(msg.copy) : undefined}>
                    {msg.icon && <i className={msg.icon}></i>} {/* 顯示圖標 */}
                    {msg.isHTML ? (
                        <span dangerouslySetInnerHTML={{ __html: msg.text }}></span>
                    ) : (
                        msg.text
                    )}
                    </div>
                ))}
                </div>  
                <div className="input-area">
                <input
                    className="input-message"
                    id="messageInput"
                    placeholder="輸入消息..."
                    value={inputMessage}
                    onChange={(e) => setInputMessage(e.target.value)}
                />
                <button className="send-button" onClick={handleSendMessage}>
                    Send
                </button>
                </div>
            </div>
        );
    };

    // 主 App 組件
    const App = ({subject}) => {
      React.useEffect(() => {
        document.title = subject; // 設置動態標題
      }, [subject]);

      return (
        <React.Fragment>
          <Container subject='將字串轉換為MD5！'/>
        </React.Fragment>
      );
    };

    // 渲染 App 組件到 DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App subject='將字串轉換為MD5！'/>);
  </script>
</body>
</html>
