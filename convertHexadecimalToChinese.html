<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.css" rel="stylesheet"/>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6.26.0/babel.min.js"></script>
    <script src="useSharedContent.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const Container = ({subject}) => {
        const comment1 = { text: "請輸入十六進制數組 (用 ',' 隔開)，我將幫你轉換成字符串<br>或是輸入字符串，我將幫你轉換成十六進制數組。", type: "received" };

        const pointMessages = [
            { text: `十六進制是一種數字系統，使用 0-9 和 A-F 來表示數字。在計算機科學中，十六進制常用於表示字節值或顏色值。每個十六進制數字代表四個二進制位（bit），因此兩個十六進制數字可以表示一個字節（8 位）`,
                type: "received", icon: "fa-solid fa-mug-hot", isHTML: true },
        ];

        const exampleMessages = [
            { text: "範例1如下：", type: "received", icon: "fa-solid fa-book" },
            { text: "0x51b0,0x6dc7,0x6dcb", type: "sent" },
            { text: "冰淇淋", type: "received"},
            { text: "範例2如下：", type: "received", icon: "fa-solid fa-book" },
            { text: "我很喜歡", type: "sent" },
            { text: "0x6211,0x5F88,0x559C,0x6B61", type: "received"},
        ];

        const testMessages = [
            '0x62110x6211','0x6211 0x6211','０ｘ６２１１','0x5F88,冰,',',0x5F88,0x5590x6211','我很喜歡,0x51b0,0x6dc7,0x6dcb',',淇,','0x51b0,淇,0x6dcb','冰,0x6dc7,淋','0x51b0,0x6dc7,0x6dcb','我很喜歡'
        ]

        const [messages, setMessages] = React.useState([
            // default messages
        ]);
    
        const [unit, setUnit] = React.useState(""); // 儲存當前使用的單位
        const [inputMessage, setInputMessage] = React.useState("");
        const [firstInput, setFirstInput] = React.useState(null); // 儲存第一次輸入的數值
        
        const handleSendMessage = () => {
            // 調用 common.js 中的全局方法
            window.SharedContent.handleSendMessage(subject, inputMessage, setMessages, setInputMessage,
                                                    pointMessages, exampleMessages, testMessages
            );
        };

        // 滾動功能
        React.useEffect(() => {
            // 調用全局的滾動方法
            window.SharedContent.scrollToBottom("chatBody");
        }, [messages]);

        const HexArrayToStringToHexArray = (inputMessage) => {
            let result = 'ok';
            let msg = '';

            if (inputMessage.includes(",")) {
                // 處理以逗號分隔的輸入
                const array = inputMessage.split(",");
                msg = array
                    .map(code => 
                        typeof code === 'string' && code.startsWith('0x') 
                            ? String.fromCharCode(parseInt(code, 16)) 
                            : code
                    )
                    .join('');
            } else if (/^0x[0-9A-Fa-f]+$/.test(inputMessage)) {
                // 處理單個十六進制數
                // if (inputMessage.length > 6) {
                //     setTimeout(() => {
                //         setMessages((prevMessages) => [
                //                 ...prevMessages,
                //                 comment1,
                //                 { text: "0x51b0,0x6dc7,0x6dcb", type: "sent" },
                //                 { text: "你好", type: "sent" },
                //                 window.SharedContent.comment2
                //             ]);
                //     }, 1000);
                //     return;
                // } else {
                    msg = String.fromCharCode(parseInt(inputMessage, 16));
                // }
            } else {
                // 處理非十六進制的普通字串
                msg = stringToHexArray(inputMessage).toString();
            }

            return { result, msg, copy: msg };
        };

        // 將字符串轉換為十六進制數組
        const stringToHexArray = (messageText) => {
            return Array.from(messageText).map(char => '0x'+char.charCodeAt(0).toString(16).padStart(2, '0'));
        }

        window.SharedContent.resultMethod = (inputMessage ,istest) =>{
            if(istest){
                setMessages((prevMessages) => [
                    ...prevMessages,
                    { text: inputMessage, type: "sent" }
                ]);
            }

            const msg = HexArrayToStringToHexArray(inputMessage);

            if(msg.result === 'error' || istest){
                setTimeout(() => {
                    setMessages((prevMessages) => [
                        ...prevMessages,
                        { text: msg.msg, type: "received"}
                    ]);
                }, 1000);
            }else if(msg.result === 'ok'){
                setTimeout(() => {
                    setMessages((prevMessages) => [
                        ...prevMessages,
                        { text: msg.msg, type: "received cancopy", icon: "fa-solid fa-copy", isHTML: true, copy: msg.copy}
                    ]);
                }, 1000);
            }
        }

        return (
            <div className="container">
                <div className="link-area" dangerouslySetInnerHTML={{ __html: subject }}></div>
                <div className="chat-box" id="chatBody">
                {messages.map((msg, index) => (
                    <div key={index} className={`message ${msg.type}`}
                    onClick={msg.copy && msg.type.includes("cancopy") ? 
                        () => window.SharedContent.handleCopy(msg.copy) : undefined}>{msg.icon && <i className={msg.icon}></i>} {/* 顯示圖標 */}
                    {msg.isHTML ? (
                        <span dangerouslySetInnerHTML={{ __html: msg.text }}></span>
                    ) : (
                        msg.text
                    )}
                    </div>
                ))}
                </div>  
                <div className="input-area">
                <input
                    className="input-message"
                    id="messageInput"
                    placeholder="輸入消息..."
                    value={inputMessage}
                    onChange={(e) => setInputMessage(e.target.value)}
                />
                <button className="send-button" onClick={handleSendMessage}>
                    Send
                </button>
                </div>
            </div>
        );
    };

    // 主 App 組件
    const App = ({subject}) => {
      React.useEffect(() => {
        document.title = subject; // 設置動態標題
      }, [subject]);

      return (
        <React.Fragment>
          <Container subject='字符串和十六进制的相互转换方式<br>convert hexadecimal to string！'/>
        </React.Fragment>
      );
    };

    // 渲染 App 組件到 DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App subject='字符串和十六进制的相互转换方式 convert hexadecimal to string！'/>);
  </script>
</body>
</html>
